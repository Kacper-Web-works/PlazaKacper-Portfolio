<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Calculator</title>
    <style>
    * { margin: 0; padding: 0; }

    body {
        background-color: #879eb5;
        display: flex;
        justify-content: center;
        align-items: center;     
        height: 100vh;           
        font-family: Verdana;
    }

    #kalk {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #6aacb7;
        border: 1px solid black;
        border-radius: 10px;
        padding: 30px;
        width: fit-content;
        min-width: 300px;
    }

    #Pwmk {
        margin: 10px 0;
        padding: 5px;
    }

    h2 {
        font-size: 1.2em;
        color: white; 
    }
    #back-btn {
    padding: 10px;
    margin: 10px;
    background-color: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    border-radius: 5px;
    font-family: Arial, sans-serif;
}
</style>
  

</head>
<body>
    <div id="kalk">
     <div id="kalk">
    <h2>Enter surface area in square meters:</h2>
    <p style="color: white; font-size: 0.8em; margin-bottom: 10px;">(Assumption: 1 can of paint covers 5m²)</p>
    <input type="number" id="Pwmk">   
    <div id="odp"></div>
</div>
<br>
<a href="index.html" id="back-btn"><- Back to Portfolio</a>

<script>
    Pwmk.addEventListener('input', function(){
        let suma = Pwmk.value / 5;
        odp.innerHTML = "<h3>Cans of paint needed: " + Math.ceil(suma) + "</h3>";

        if(Pwmk.value < 0){
            odp.innerHTML = "<h2>Please enter a positive number!</h2>";
        }
    });
</script>


</body>
</html>
